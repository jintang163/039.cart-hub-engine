<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车分享功能演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
               min-height: 100vh; padding: 20px; color: #303133; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; color: #fff; margin-bottom: 30px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .card-title { font-size: 20px; font-weight: 600; margin-bottom: 16px;
                      display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 4px; height: 20px;
                              background: linear-gradient(135deg, #667eea, #764ba2);
                              border-radius: 2px; }

        .btn { display: inline-flex; align-items: center; gap: 6px;
               padding: 10px 20px; border: none; border-radius: 8px;
               cursor: pointer; font-size: 14px; font-weight: 500;
               transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(17,153,142,0.4); }
        .btn-warning { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .btn-warning:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,87,108,0.4); }
        .btn-plain { background: #f5f7fa; color: #606266; border: 1px solid #dcdfe6; }
        .btn-plain:hover { background: #ecf5ff; color: #409EFF; border-color: #409EFF; }
        .btn-danger { background: #fef0f0; color: #F56C6C; border: 1px solid #fbc4c4; }
        .btn-danger:hover { background: #fef0f0; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .input-group { margin-bottom: 16px; }
        .input-label { display: block; font-size: 14px; color: #606266; margin-bottom: 6px; }
        .input-control { width: 100%; padding: 10px 12px; border: 1px solid #dcdfe6;
                        border-radius: 6px; font-size: 14px; transition: all 0.2s; }
        .input-control:focus { border-color: #667eea; outline: none;
                              box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .row { display: flex; gap: 16px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }

        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                        gap: 12px; }
        .product-card { border: 1px solid #ebeef5; border-radius: 8px; padding: 12px;
                       text-align: center; transition: all 0.2s; cursor: pointer; }
        .product-card:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,0.15);
                              transform: translateY(-2px); }
        .product-card.selected { border-color: #667eea; background: #f0f3ff; }
        .product-img { width: 100%; height: 100px;
                       background: linear-gradient(135deg, #667eea, #764ba2);
                       border-radius: 6px; margin-bottom: 10px;
                       display: flex; align-items: center; justify-content: center;
                       color: #fff; font-size: 28px; }
        .product-name { font-weight: 500; font-size: 14px; margin-bottom: 4px;
                       overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-price { color: #F56C6C; font-size: 16px; font-weight: 600; }
        .product-qty { margin-top: 8px; display: flex; align-items: center;
                      justify-content: center; gap: 8px; }
        .qty-btn { width: 24px; height: 24px; border-radius: 50%;
                  border: 1px solid #dcdfe6; background: #fff;
                  cursor: pointer; font-size: 14px; display: flex;
                  align-items: center; justify-content: center; }
        .qty-btn:hover { border-color: #667eea; color: #667eea; }
        .qty-value { min-width: 30px; text-align: center; font-weight: 500; }

        .cart-item { display: flex; align-items: center; padding: 12px;
                    border-bottom: 1px solid #f0f0f0; gap: 12px; }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-img { width: 60px; height: 60px; border-radius: 6px;
                        background: linear-gradient(135deg, #f093fb, #f5576c);
                        display: flex; align-items: center; justify-content: center;
                        color: #fff; font-size: 20px; flex-shrink: 0; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 500; margin-bottom: 4px; }
        .cart-item-meta { font-size: 12px; color: #909399; }
        .cart-item-price { color: #F56C6C; font-weight: 600; }
        .cart-item-qty { color: #909399; font-size: 13px; }

        .share-btn-container { display: flex; gap: 10px; flex-wrap: wrap;
                              padding: 16px; background: #f5f7fa;
                              border-radius: 8px; margin-top: 16px; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                        background: rgba(0,0,0,0.5); display: none;
                        align-items: center; justify-content: center; z-index: 1000;
                        animation: fadeIn 0.2s; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 24px;
                max-width: 420px; width: 90%; animation: slideUp 0.3s; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px;
                      display: flex; align-items: center; justify-content: space-between; }
        .modal-close { width: 28px; height: 28px; border-radius: 50%;
                      border: none; background: #f5f7fa; cursor: pointer;
                      font-size: 18px; color: #909399; }
        .modal-close:hover { background: #ebeef5; color: #606266; }

        .qr-container { text-align: center; padding: 20px 0; }
        .qr-code { width: 180px; height: 180px; margin: 0 auto 16px;
                   background: #f5f7fa; border-radius: 8px;
                   display: flex; align-items: center; justify-content: center;
                   position: relative; overflow: hidden; }
        .qr-code::before { content: ''; position: absolute; inset: 20px;
                          background: repeating-conic-gradient(#000 0 25%, #fff 0 50%) 0 0/16px 16px; }
        .qr-code::after { content: '📱'; position: relative;
                         font-size: 48px; background: #fff; padding: 10px;
                         border-radius: 8px; }
        .qr-tip { color: #909399; font-size: 13px; }

        .share-link-box { display: flex; gap: 8px; margin-top: 16px; }
        .share-link { flex: 1; padding: 10px 12px; background: #f5f7fa;
                     border-radius: 6px; font-family: monospace; font-size: 13px;
                     color: #606266; overflow: hidden; text-overflow: ellipsis;
                     white-space: nowrap; }

        .share-options { margin-bottom: 16px; }
        .option-group { margin-bottom: 12px; }
        .option-label { font-size: 14px; color: #606266; margin-bottom: 6px;
                       display: block; }
        .option-row { display: flex; gap: 12px; }
        .option-item { flex: 1; padding: 10px; border: 1px solid #dcdfe6;
                      border-radius: 6px; cursor: pointer; text-align: center;
                      font-size: 13px; transition: all 0.2s; }
        .option-item:hover { border-color: #667eea; }
        .option-item.active { border-color: #667eea; background: #f0f3ff; color: #667eea; }

        .share-info { background: #ecf5ff; border-radius: 8px; padding: 12px;
                     margin-top: 12px; font-size: 13px; color: #409EFF; }
        .share-info strong { color: #667eea; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
                background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px;
                border-radius: 6px; z-index: 2000; animation: toastIn 0.3s;
                font-size: 14px; }

        .invalid-item { background: #fef0f0; border-left: 3px solid #F56C6C;
                       padding: 10px 12px; border-radius: 4px; margin-bottom: 8px; }
        .invalid-item-name { font-weight: 500; color: #303133; margin-bottom: 2px; }
        .invalid-item-reason { font-size: 12px; color: #F56C6C; }

        .empty-state { text-align: center; padding: 40px 20px; color: #909399; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

        .share-list-item { display: flex; align-items: center; padding: 12px;
                          border: 1px solid #ebeef5; border-radius: 8px;
                          margin-bottom: 8px; transition: all 0.2s; }
        .share-list-item:hover { border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.1); }
        .share-list-info { flex: 1; }
        .share-list-title { font-weight: 500; margin-bottom: 4px; }
        .share-list-meta { font-size: 12px; color: #909399; }
        .share-list-actions { display: flex; gap: 8px; }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
                font-size: 12px; font-weight: 500; }
        .badge-success { background: #f0f9eb; color: #67C23A; }
        .badge-warning { background: #fdf6ec; color: #E6A23C; }
        .badge-info { background: #ecf5ff; color: #409EFF; }

        .stats-row { display: flex; gap: 20px; margin-top: 12px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 20px; font-weight: 600; color: #667eea; }
        .stat-label { font-size: 12px; color: #909399; margin-top: 2px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; }
                            to { transform: translateY(0); opacity: 1; } }
        @keyframes toastIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
                            to { transform: translateX(-50%) translateY(0); opacity: 1; } }

        .tabs { display: flex; gap: 0; margin-bottom: 20px; background: #fff;
               border-radius: 8px; padding: 4px; }
        .tab-item { flex: 1; padding: 12px 16px; text-align: center;
                   cursor: pointer; border-radius: 6px; font-weight: 500;
                   color: #606266; transition: all 0.2s; }
        .tab-item.active { background: linear-gradient(135deg, #667eea, #764ba2);
                          color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .divider { height: 1px; background: #f0f0f0; margin: 16px 0; }

        .result-card { padding: 16px; border-radius: 8px; margin-top: 16px; }
        .result-success { background: #f0f9eb; border: 1px solid #67C23A; }
        .result-warning { background: #fdf6ec; border: 1px solid #E6A23C; }
        .result-title { font-weight: 600; margin-bottom: 8px; }
        .result-success .result-title { color: #67C23A; }
        .result-warning .result-title { color: #E6A23C; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 购物车分享功能</h1>
            <p>一键分享购物车，好友轻松合并同款</p>
        </div>

        <div class="tabs">
            <div class="tab-item active" onclick="switchTab('share')">分享我的购物车</div>
            <div class="tab-item" onclick="switchTab('accept')">接受好友分享</div>
            <div class="tab-item" onclick="switchTab('list')">我的分享列表</div>
        </div>

        <div id="tab-share" class="tab-content active">
            <div class="card">
                <div class="card-title">选择商品加入购物车</div>
                <div class="product-list" id="productList"></div>

                <div class="divider"></div>

                <div class="card-title">我的购物车</div>
                <div id="cartItems">
                    <div class="empty-state">
                        <div class="empty-icon">🛒</div>
                        <div>购物车还是空的，快去添加商品吧</div>
                    </div>
                </div>

                <div class="share-btn-container">
                    <button class="btn btn-primary" onclick="openShareModal()">
                        <span>🔗</span> 生成分享链接
                    </button>
                    <button class="btn btn-success" onclick="openShareModal('qr')">
                        <span>📱</span> 生成分享二维码
                    </button>
                    <button class="btn btn-plain" onclick="refreshCart()">
                        <span>🔄</span> 刷新购物车
                    </button>
                </div>
            </div>
        </div>

        <div id="tab-accept" class="tab-content">
            <div class="card">
                <div class="card-title">接受好友分享</div>
                <div class="input-group">
                    <label class="input-label">分享码 / 分享链接</label>
                    <input type="text" class="input-control" id="shareIdInput"
                           placeholder="请输入分享码或粘贴分享链接">
                </div>
                <div class="input-group">
                    <label class="input-label">访问密码（如有）</label>
                    <input type="password" class="input-control" id="sharePassword"
                           placeholder="请输入访问密码">
                </div>
                <div class="row">
                    <button class="btn btn-primary col" onclick="viewShare()">
                        <span>👁️</span> 查看分享内容
                    </button>
                    <button class="btn btn-success col" onclick="acceptShare()">
                        <span>✅</span> 一键合并到我的购物车
                    </button>
                </div>

                <div id="sharePreview" style="margin-top: 20px; display: none;">
                    <div class="divider"></div>
                    <div class="card-title">分享内容预览</div>
                    <div id="sharePreviewContent"></div>
                </div>

                <div id="mergeResult" style="display: none;"></div>
            </div>

            <div class="card">
                <div class="card-title">示例分享码</div>
                <p style="color: #909399; font-size: 13px; margin-bottom: 12px;">
                    先在"分享我的购物车"页面创建分享，然后在这里输入分享码测试
                </p>
                <button class="btn btn-plain" onclick="loadDemoShare()">加载示例分享</button>
            </div>
        </div>

        <div id="tab-list" class="tab-content">
            <div class="card">
                <div class="card-title">我创建的分享</div>
                <div id="shareList">
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div>暂无分享记录</div>
                    </div>
                </div>
                <div style="margin-top: 16px;">
                    <button class="btn btn-plain" onclick="loadShareList()">
                        <span>🔄</span> 刷新列表
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <div class="modal-title">
                <span>分享购物车</span>
                <button class="modal-close" onclick="closeShareModal()">×</button>
            </div>

            <div class="share-options">
                <div class="option-group">
                    <label class="option-label">分享标题</label>
                    <input type="text" class="input-control" id="shareTitle"
                           placeholder="给分享起个名字，如：我的618购物清单">
                </div>

                <div class="option-group">
                    <label class="option-label">有效期</label>
                    <div class="option-row">
                        <div class="option-item active" data-expire="24" onclick="selectExpire(this)">
                            <div style="font-weight: 600;">24小时</div>
                            <div style="font-size: 11px; color: #909399; margin-top: 2px;">推荐</div>
                        </div>
                        <div class="option-item" data-expire="72" onclick="selectExpire(this)">
                            <div style="font-weight: 600;">3天</div>
                        </div>
                        <div class="option-item" data-expire="168" onclick="selectExpire(this)">
                            <div style="font-weight: 600;">7天</div>
                        </div>
                    </div>
                </div>

                <div class="option-group">
                    <label class="option-label">访问密码（可选）</label>
                    <input type="text" class="input-control" id="sharePwd"
                           placeholder="设置密码后，好友需要输入密码才能查看">
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%;" onclick="createShare()">
                生成分享
            </button>

            <div id="shareResult" style="display: none; margin-top: 20px;">
                <div class="divider"></div>

                <div class="qr-container" id="qrSection" style="display: none;">
                    <div class="qr-code"></div>
                    <div class="qr-tip">打开手机扫码，即可查看分享内容</div>
                </div>

                <div class="share-link-box">
                    <div class="share-link" id="shareLink"></div>
                    <button class="btn btn-plain" onclick="copyShareLink()">复制</button>
                </div>

                <div class="share-info">
                    ✅ 分享创建成功！分享码：<strong id="shareCode"></strong><br>
                    ⏰ 过期时间：<span id="expireTime"></span><br>
                    🔒 密码保护：<span id="pwdStatus"></span>
                </div>

                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value" id="shareItemCount">0</div>
                        <div class="stat-label">商品件数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="shareTotalAmount">¥0.00</div>
                        <div class="stat-label">总金额</div>
                    </div>
                </div>

                <div style="margin-top: 16px; display: flex; gap: 8px;">
                    <button class="btn btn-plain col" onclick="copyShareCode()">复制分享码</button>
                    <button class="btn btn-success col" onclick="shareToWeChat()">微信分享</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./cart-hub-sdk.js"></script>
    <script>
        let sdk = null;
        let selectedExpireHours = 24;
        let currentShareData = null;
        let productQuantities = {};

        const products = [
            { skuId: 'SKU001', name: '无线蓝牙耳机 Pro', price: 299.00, icon: '🎧' },
            { skuId: 'SKU002', name: '机械键盘 RGB版', price: 459.00, icon: '⌨️' },
            { skuId: 'SKU003', name: '人体工学鼠标', price: 189.00, icon: '🖱️' },
            { skuId: 'SKU004', name: '27寸 2K显示器', price: 1599.00, icon: '🖥️' },
            { skuId: 'SKU005', name: '智能手表 Ultra', price: 2499.00, icon: '⌚' },
            { skuId: 'SKU006', name: '便携音箱 Mini', price: 129.00, icon: '🔊' },
            { skuId: 'SKU007', name: '移动电源 20000mAh', price: 199.00, icon: '🔋' },
            { skuId: 'SKU008', name: '手机支架', price: 49.00, icon: '📱' },
        ];

        function initSDK() {
            sdk = CartHubSDK.create({
                baseUrl: 'http://localhost:8080/cart-hub',
                tenantId: 'default',
                bizType: 'ecommerce',
                userId: 'demo_user_001',
                source: 'web',
                debug: true
            });
            sdk.on('cartChanged', () => refreshCart());
            renderProducts();
            refreshCart();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            if (tabName === 'list') {
                loadShareList();
            }
        }

        function renderProducts() {
            const container = document.getElementById('productList');
            container.innerHTML = products.map(p => `
                <div class="product-card" data-sku="${p.skuId}">
                    <div class="product-img">${p.icon}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">¥${p.price.toFixed(2)}</div>
                    <div class="product-qty">
                        <button class="qty-btn" onclick="changeQty('${p.skuId}', -1, event)">−</button>
                        <span class="qty-value" id="qty_${p.skuId}">${productQuantities[p.skuId] || 0}</span>
                        <button class="qty-btn" onclick="changeQty('${p.skuId}', 1, event)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(skuId, delta, e) {
            e.stopPropagation();
            productQuantities[skuId] = (productQuantities[skuId] || 0) + delta;
            if (productQuantities[skuId] < 0) productQuantities[skuId] = 0;
            document.getElementById('qty_' + skuId).textContent = productQuantities[skuId];

            const card = document.querySelector(`.product-card[data-sku="${skuId}"]`);
            if (productQuantities[skuId] > 0) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        }

        async function addToCart(skuId, quantity) {
            const product = products.find(p => p.skuId === skuId);
            if (!product) return;
            try {
                await sdk.addItem({
                    skuId: product.skuId,
                    unitPrice: product.price,
                    quantity: quantity,
                    itemName: product.name
                });
                showToast('已添加 ' + product.name + ' x' + quantity);
            } catch (e) {
                showToast('添加失败：' + e.message, 'error');
            }
        }

        async function refreshCart() {
            if (!sdk) return;
            try {
                const cart = await sdk.getCartSimple();
                renderCart(cart);
            } catch (e) {
                console.error('Refresh cart failed:', e);
            }
        }

        function renderCart(cart) {
            const container = document.getElementById('cartItems');
            if (!cart || !cart.items || cart.items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🛒</div>
                        <div>购物车还是空的，快去添加商品吧</div>
                    </div>
                `;
                return;
            }

            const productMap = {};
            products.forEach(p => productMap[p.skuId] = p);

            container.innerHTML = cart.items.map(item => {
                const p = productMap[item.skuId];
                const icon = p ? p.icon : '📦';
                return `
                    <div class="cart-item">
                        <div class="cart-item-img">${icon}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.itemName || item.skuId}</div>
                            <div class="cart-item-meta">
                                ${item.priceChanged ? '<span class="badge badge-warning">价格已变动</span>' : ''}
                                ${!item.onShelf ? '<span class="badge badge-danger">已下架</span>' : ''}
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="cart-item-price">¥${item.unitPrice}</div>
                            <div class="cart-item-qty">x${item.quantity}</div>
                        </div>
                    </div>
                `;
            }).join('');

            const totalQty = cart.items.reduce((sum, i) => sum + (i.quantity || 0), 0);
            const totalAmount = cart.totalAmount || '0.00';

            container.innerHTML += `
                <div style="padding: 16px; background: #f5f7fa; border-radius: 8px; margin-top: 12px;
                           display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span style="color: #606266;">共 ${cart.items.length} 件商品，</span>
                        <span style="color: #606266;">${totalQty} 件</span>
                    </div>
                    <div>
                        <span style="color: #606266;">合计：</span>
                        <span style="color: #F56C6C; font-size: 20px; font-weight: 600;">¥${totalAmount}</span>
                    </div>
                </div>
            `;
        }

        function openShareModal(type) {
            document.getElementById('shareModal').classList.add('show');
            document.getElementById('shareResult').style.display = 'none';
            document.getElementById('qrSection').style.display = type === 'qr' ? 'block' : 'none';
            document.getElementById('shareTitle').value = '';
            document.getElementById('sharePwd').value = '';
            selectedExpireHours = 24;
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('active'));
            document.querySelector('.option-item[data-expire="24"]').classList.add('active');
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('show');
        }

        function selectExpire(el) {
            document.querySelectorAll('.option-item[data-expire]').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            selectedExpireHours = parseInt(el.dataset.expire);
        }

        async function createShare() {
            if (!sdk) return showToast('请先初始化SDK', 'error');
            try {
                const cart = await sdk.getCartSimple();
                if (!cart || !cart.items || cart.items.length === 0) {
                    return showToast('购物车为空，无法分享', 'error');
                }

                const title = document.getElementById('shareTitle').value.trim();
                const password = document.getElementById('sharePwd').value.trim();

                const result = await sdk.createShare({
                    title: title || '我的购物车分享',
                    expireHours: selectedExpireHours,
                    password: password || undefined
                });

                currentShareData = result;

                const baseUrl = window.location.href.replace(/\/[^\/]*$/, '') + '/share-demo.html?share=';
                const shareLink = baseUrl + result.shareId;

                document.getElementById('shareLink').textContent = shareLink;
                document.getElementById('shareCode').textContent = result.shareId;
                document.getElementById('expireTime').textContent = result.expireTime;
                document.getElementById('pwdStatus').textContent = result.needPassword ? '已开启' : '未开启';
                document.getElementById('shareItemCount').textContent = result.itemCount || cart.items.length;
                document.getElementById('shareTotalAmount').textContent = '¥' + (result.totalAmount || cart.totalAmount);
                document.getElementById('shareResult').style.display = 'block';

                showToast('分享创建成功！');
            } catch (e) {
                showToast('创建失败：' + e.message, 'error');
            }
        }

        function copyShareLink() {
            const link = document.getElementById('shareLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                showToast('链接已复制到剪贴板');
            });
        }

        function copyShareCode() {
            const code = document.getElementById('shareCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast('分享码已复制：' + code);
            });
        }

        function shareToWeChat() {
            showToast('请在微信中打开此页面进行分享');
        }

        function parseShareId(input) {
            if (!input) return '';
            input = input.trim();
            const match = input.match(/share=([A-Z0-9]+)/);
            if (match) return match[1];
            if (/^[A-Z0-9]{8}$/.test(input)) return input;
            return input;
        }

        async function viewShare() {
            const input = document.getElementById('shareIdInput').value;
            const shareId = parseShareId(input);
            const password = document.getElementById('sharePassword').value;

            if (!shareId) return showToast('请输入分享码', 'error');

            try {
                const cart = await sdk.viewShare(shareId, password || undefined);
                currentShareData = { shareId, cart };
                renderSharePreview(cart);
                document.getElementById('sharePreview').style.display = 'block';
                document.getElementById('mergeResult').style.display = 'none';
            } catch (e) {
                showToast('查看失败：' + e.message, 'error');
            }
        }

        function renderSharePreview(cart) {
            const container = document.getElementById('sharePreviewContent');
            if (!cart || !cart.items || cart.items.length === 0) {
                container.innerHTML = '<div class="empty-state">分享内容为空</div>';
                return;
            }

            const productMap = {};
            products.forEach(p => productMap[p.skuId] = p);

            container.innerHTML = cart.items.map(item => {
                const p = productMap[item.skuId];
                const icon = p ? p.icon : '📦';
                return `
                    <div class="cart-item">
                        <div class="cart-item-img">${icon}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.itemName || item.skuId}</div>
                            <div class="cart-item-meta">
                                ${item.priceChanged ? '<span class="badge badge-warning">价格已变动</span>' : ''}
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="cart-item-price">¥${item.unitPrice}</div>
                            <div class="cart-item-qty">x${item.quantity}</div>
                        </div>
                    </div>
                `;
            }).join('');

            const totalQty = cart.items.reduce((sum, i) => sum + (i.quantity || 0), 0);
            container.innerHTML += `
                <div style="padding: 16px; background: #f5f7fa; border-radius: 8px; margin-top: 12px;
                           display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: #606266;">共 ${cart.items.length} 件商品，${totalQty} 件</span>
                    <span style="color: #F56C6C; font-size: 20px; font-weight: 600;">¥${cart.totalAmount || '0.00'}</span>
                </div>
            `;
        }

        async function acceptShare() {
            const input = document.getElementById('shareIdInput').value;
            const shareId = parseShareId(input);
            const password = document.getElementById('sharePassword').value;

            if (!shareId) return showToast('请输入分享码', 'error');

            try {
                const result = await sdk.acceptShare(shareId, password || undefined);
                renderMergeResult(result);
            } catch (e) {
                showToast('合并失败：' + e.message, 'error');
            }
        }

        function renderMergeResult(result) {
            const container = document.getElementById('mergeResult');
            container.style.display = 'block';

            const invalidItems = result.invalidItems || [];

            let html = '';
            if (result.success && result.mergedCount > 0) {
                html += `
                    <div class="result-card result-success">
                        <div class="result-title">✅ ${result.message || '合并成功'}</div>
                        <div style="font-size: 14px; color: #606266;">
                            成功合并 <strong style="color: #67C23A;">${result.mergedCount}</strong> 件商品，
                            共 <strong style="color: #67C23A;">${result.mergedQuantity}</strong> 件，
                            金额 <strong style="color: #67C23A;">¥${result.mergedAmount}</strong>
                        </div>
                    </div>
                `;
            } else if (!result.success) {
                html += `
                    <div class="result-card result-warning">
                        <div class="result-title">⚠️ ${result.message || '合并失败'}</div>
                    </div>
                `;
            }

            if (invalidItems.length > 0) {
                html += `
                    <div style="margin-top: 16px;">
                        <div style="font-weight: 500; margin-bottom: 12px; color: #F56C6C;">
                            以下商品不可购买：
                        </div>
                        ${invalidItems.map(item => `
                            <div class="invalid-item">
                                <div class="invalid-item-name">${item.itemName || item.skuId}</div>
                                <div class="invalid-item-reason">原因：${item.reason}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            container.innerHTML = html;

            if (result.success && result.mergedCount > 0) {
                refreshCart();
            }
        }

        async function loadShareList() {
            if (!sdk) return;
            try {
                const shares = await sdk.listMyShares();
                renderShareList(shares);
            } catch (e) {
                console.error('Load share list failed:', e);
            }
        }

        function renderShareList(shares) {
            const container = document.getElementById('shareList');
            if (!shares || shares.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div>暂无分享记录</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = shares.map(share => {
                const isExpired = new Date(share.expireTime) < new Date();
                return `
                    <div class="share-list-item">
                        <div style="font-size: 32px; margin-right: 12px;">🔗</div>
                        <div class="share-list-info">
                            <div class="share-list-title">
                                ${share.title || '购物车分享'}
                                ${isExpired ? '<span class="badge badge-warning" style="margin-left: 8px;">已过期</span>' : '<span class="badge badge-success" style="margin-left: 8px;">有效</span>'}
                            </div>
                            <div class="share-list-meta">
                                分享码：${share.shareId} · 
                                ${share.itemCount}件商品 · 
                                👁️ ${share.viewCount}次浏览 · 
                                ✅ ${share.acceptCount}次合并 · 
                                过期时间：${new Date(share.expireTime).toLocaleString()}
                            </div>
                        </div>
                        <div class="share-list-actions">
                            <button class="btn btn-plain" onclick="copyShareId('${share.shareId}')">复制</button>
                            ${!isExpired ? `<button class="btn btn-danger" onclick="cancelShare('${share.shareId}')">取消</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function copyShareId(shareId) {
            navigator.clipboard.writeText(shareId).then(() => {
                showToast('分享码已复制：' + shareId);
            });
        }

        async function cancelShare(shareId) {
            if (!confirm('确定取消该分享吗？')) return;
            try {
                await sdk.cancelShare(shareId);
                showToast('分享已取消');
                loadShareList();
            } catch (e) {
                showToast('取消失败：' + e.message, 'error');
            }
        }

        async function loadDemoShare() {
            document.getElementById('shareIdInput').value = 'DEMO1234';
            showToast('已加载示例分享码，实际使用请替换为真实分享码');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'error' ? 'rgba(245,108,108,0.95)' : 'rgba(0,0,0,0.8)';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function initFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const shareId = params.get('share');
            if (shareId) {
                switchTab('accept');
                document.getElementById('shareIdInput').value = shareId;
                viewShare();
            }
        }

        document.getElementById('productList').addEventListener('click', async (e) => {
            const card = e.target.closest('.product-card');
            if (!card || e.target.closest('.qty-btn')) return;
            const skuId = card.dataset.sku;
            const qty = productQuantities[skuId] || 1;
            if (qty > 0) {
                await addToCart(skuId, qty);
                productQuantities[skuId] = 0;
                document.getElementById('qty_' + skuId).textContent = 0;
                card.classList.remove('selected');
            }
        });

        initSDK();
        initFromUrl();
    </script>
</body>
</html>
