<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阶梯满减实时计算 - CartHub SDK</title>
    <script src="../cart-hub-sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4ecf7 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .header p {
            color: #8c8c8c;
            font-size: 14px;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, #ff6b6b, #ee5a6f);
            border-radius: 2px;
        }
        .progress-banner {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe8e8 100%);
            border: 1px solid #ffd4d4;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 18px;
        }
        .progress-tip {
            font-size: 15px;
            font-weight: 600;
            color: #e54d42;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .progress-bar-container {
            position: relative;
            height: 10px;
            background: #ffd4d4;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ee5a6f);
            border-radius: 5px;
            transition: width 0.4s ease;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
        }
        .progress-info .highlight {
            color: #e54d42;
            font-weight: 600;
        }
        .tiers-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .tier-item {
            display: flex;
            align-items: center;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #eee;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .tier-item.reached {
            background: linear-gradient(135deg, #f6ffed 0%, #d9f7be 100%);
            border-color: #b7eb8f;
        }
        .tier-item.active {
            background: linear-gradient(135deg, #fffbe6 0%, #fff1b8 100%);
            border-color: #ffe58f;
            box-shadow: 0 2px 8px rgba(250, 173, 20, 0.15);
        }
        .tier-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
            flex-shrink: 0;
            background: #f0f0f0;
            color: #999;
        }
        .tier-item.reached .tier-icon {
            background: #52c41a;
            color: #fff;
        }
        .tier-item.active .tier-icon {
            background: #faad14;
            color: #fff;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .tier-content {
            flex: 1;
        }
        .tier-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
            color: #333;
        }
        .tier-item.reached .tier-title { color: #389e0d; }
        .tier-item.active .tier-title { color: #d48806; }
        .tier-desc {
            font-size: 12px;
            color: #999;
        }
        .tier-item.reached .tier-desc { color: #52c41a; }
        .tier-item.active .tier-desc { color: #faad14; }
        .tier-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: #f0f0f0;
            color: #999;
        }
        .tier-item.reached .tier-badge {
            background: #52c41a;
            color: #fff;
        }
        .tier-item.active .tier-badge {
            background: #faad14;
            color: #fff;
        }
        .summary-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 16px;
            padding: 14px;
            background: #fafafa;
            border-radius: 8px;
        }
        @media (max-width: 600px) {
            .summary-row { grid-template-columns: repeat(2, 1fr); }
        }
        .summary-item {
            text-align: center;
        }
        .summary-value {
            font-size: 18px;
            font-weight: 700;
            color: #e54d42;
        }
        .summary-value.discount {
            color: #52c41a;
        }
        .summary-value.pay {
            color: #1890ff;
        }
        .summary-label {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        @media (max-width: 480px) {
            .product-grid { grid-template-columns: 1fr; }
        }
        .product-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .product-item:hover {
            border-color: #ff6b6b;
            background: #fff5f5;
        }
        .product-item.selected {
            border-color: #ff6b6b;
            background: #fff5f5;
        }
        .product-img {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            flex-shrink: 0;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
        }
        .product-info {
            flex: 1;
            min-width: 0;
        }
        .product-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .product-price {
            font-size: 14px;
            color: #e54d42;
            font-weight: 600;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        .qty-btn {
            width: 22px;
            height: 22px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        .qty-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        .qty-value {
            min-width: 24px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
        }
        .cart-list {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }
        .cart-empty {
            padding: 40px 20px;
            text-align: center;
            color: #bbb;
            font-size: 14px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item-img {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-shrink: 0;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }
        .cart-item-info {
            flex: 1;
            min-width: 0;
        }
        .cart-item-name {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .cart-item-price {
            font-size: 13px;
            color: #e54d42;
            font-weight: 600;
        }
        .cart-item-qty {
            font-size: 12px;
            color: #999;
            margin-right: 12px;
        }
        .cart-item-subtotal {
            font-size: 14px;
            color: #e54d42;
            font-weight: 700;
            margin-right: 12px;
        }
        .cart-item-remove {
            width: 24px;
            height: 24px;
            border: none;
            background: #fff1f0;
            color: #e54d42;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }
        .cart-item-remove:hover {
            background: #e54d42;
            color: #fff;
        }
        .action-bar {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }
        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(238, 90, 111, 0.3);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .muted-tip {
            font-size: 12px;
            color: #bbb;
            text-align: center;
            margin-top: 12px;
            line-height: 1.6;
        }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #eee, transparent);
            margin: 14px 0;
        }
        .debug-panel {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 14px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.5;
            max-height: 220px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .debug-title {
            color: #569cd6;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .debug-line {
            padding: 2px 0;
        }
        .debug-line .key { color: #9cdcfe; }
        .debug-line .value { color: #ce9178; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 阶梯满减实时计算演示</h1>
            <p>购物车总金额变化时，实时展示满减进度</p>
        </div>

        <div class="main-grid">
            <!-- 左侧：购物车操作 -->
            <div class="card">
                <div class="card-title">商品选择与购物车</div>

                <div style="font-size: 13px; color: #666; margin-bottom: 10px;">
                    点击商品加入购物车，调整数量实时查看满减进度
                </div>

                <div class="product-grid" id="productGrid"></div>

                <div class="divider"></div>

                <div style="font-size: 13px; color: #666; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <span>当前购物车</span>
                    <button class="btn btn-secondary" style="flex: none; padding: 4px 12px; font-size: 12px;" onclick="clearCart()">清空</button>
                </div>

                <div class="cart-list" id="cartList"></div>

                <div class="action-bar">
                    <button class="btn btn-secondary" onclick="loadDemoPreset('small')">小额套餐</button>
                    <button class="btn btn-secondary" onclick="loadDemoPreset('medium')">中额套餐</button>
                    <button class="btn btn-primary" onclick="loadDemoPreset('large')">大额套餐</button>
                </div>
            </div>

            <!-- 右侧：满减进度展示 -->
            <div class="card">
                <div class="card-title">阶梯满减进度</div>

                <div class="progress-banner" id="progressBanner">
                    <div class="progress-tip" id="progressTip">暂无满减活动</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="progressBarFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-info">
                        <span>当前金额：<span class="highlight" id="curAmount">¥0.00</span></span>
                        <span id="nextTierInfo">目标：<span class="highlight">¥99</span> 享 <span class="highlight">减10</span></span>
                    </div>
                </div>

                <div class="tiers-list" id="tiersList"></div>

                <div class="summary-row">
                    <div class="summary-item">
                        <div class="summary-value" id="sumTotal">¥0.00</div>
                        <div class="summary-label">商品总额</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value discount" id="sumDiscount">-¥0.00</div>
                        <div class="summary-label">满减优惠</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value pay" id="sumPay">¥0.00</div>
                        <div class="summary-label">应付金额</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="sumItems">0</div>
                        <div class="summary-label">商品件数</div>
                    </div>
                </div>

                <div class="debug-panel" id="debugPanel">
                    <div class="debug-title">📊 后端返回数据 (TieredDiscountProgressVO)</div>
                    <div id="debugContent"></div>
                </div>
            </div>
        </div>

        <p class="muted-tip">
            本页面仅用于前端功能演示，满减阶梯规则为本地模拟。<br>
            接入真实后端后，数据通过 SDK 的 <code>getCart()</code> 或 <code>getTieredDiscountProgress()</code> 获取。
        </p>
    </div>

    <script>
        const MOCK_PRODUCTS = [
            { id: 'p1', name: '无线蓝牙耳机 Pro', price: 299, emoji: '🎧' },
            { id: 'p2', name: '智能运动手表', price: 599, emoji: '⌚' },
            { id: 'p3', name: '便携充电宝 20000mAh', price: 129, emoji: '🔋' },
            { id: 'p4', name: '机械键盘 RGB背光', price: 399, emoji: '⌨️' },
            { id: 'p5', name: '高清摄像头 1080P', price: 199, emoji: '📷' },
            { id: 'p6', name: '蓝牙音箱 防水款', price: 259, emoji: '🔊' },
        ];

        const MOCK_TIER_RULES = [
            { threshold: 99, discount: 10, name: '满99减10' },
            { threshold: 199, discount: 25, name: '满199减25' },
            { threshold: 299, discount: 45, name: '满299减45' },
            { threshold: 499, discount: 80, name: '满499减80' },
            { threshold: 799, discount: 150, name: '满799减150' },
            { threshold: 1299, discount: 280, name: '满1299减280' },
        ];

        let cart = {};

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = MOCK_PRODUCTS.map(p => {
                const inCart = cart[p.id] > 0;
                return `
                    <div class="product-item ${inCart ? 'selected' : ''}" onclick="toggleProduct('${p.id}')">
                        <div class="product-img">${p.emoji}</div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">¥${p.price.toFixed(2)}</div>
                            ${inCart ? `
                                <div class="quantity-controls" onclick="event.stopPropagation()">
                                    <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
                                    <span class="qty-value">${cart[p.id]}</span>
                                    <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
                                </div>
                            ` : '<div style="font-size: 11px; color: #bbb; margin-top: 2px;">点击加入</div>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleProduct(id) {
            if (cart[id]) {
                changeQty(id, 1);
            } else {
                cart[id] = 1;
                refreshAll();
            }
        }

        function changeQty(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            refreshAll();
        }

        function removeItem(id) {
            delete cart[id];
            refreshAll();
        }

        function clearCart() {
            cart = {};
            refreshAll();
        }

        function loadDemoPreset(type) {
            cart = {};
            if (type === 'small') {
                cart['p3'] = 1; cart['p5'] = 1;
            } else if (type === 'medium') {
                cart['p1'] = 1; cart['p4'] = 1; cart['p6'] = 1;
            } else if (type === 'large') {
                cart['p2'] = 2; cart['p1'] = 1; cart['p4'] = 1;
            }
            refreshAll();
        }

        function getCartItems() {
            return Object.keys(cart).map(id => {
                const p = MOCK_PRODUCTS.find(x => x.id === id);
                return {
                    ...p,
                    quantity: cart[id],
                    subtotal: p.price * cart[id]
                };
            });
        }

        function getCartTotals() {
            const items = getCartItems();
            const totalAmount = items.reduce((s, i) => s + i.subtotal, 0);
            const totalQuantity = items.reduce((s, i) => s + i.quantity, 0);
            return { totalAmount, totalQuantity, items };
        }

        function calculateTieredProgress(totalAmount) {
            const total = totalAmount;
            const tiers = MOCK_TIER_RULES.map(rule => {
                const reached = total >= rule.threshold;
                const gapAmount = reached ? 0 : rule.threshold - total;
                const progressPercent = reached ? 100 :
                    total > 0 ? Math.round(total / rule.threshold * 100) : 0;
                return {
                    promotionId: `tier_${rule.threshold}`,
                    promotionName: rule.name,
                    thresholdAmount: rule.threshold.toFixed(2),
                    discountAmount: rule.discount.toFixed(2),
                    reached,
                    gapAmount: gapAmount.toFixed(2),
                    progressPercent
                };
            });

            let currentTier = null, nextTier = null, currentDiscountAmount = 0;
            for (let i = 0; i < tiers.length; i++) {
                if (tiers[i].reached) {
                    currentTier = tiers[i];
                    currentDiscountAmount = MOCK_TIER_RULES[i].discount;
                } else if (nextTier === null) {
                    nextTier = tiers[i];
                }
            }

            let progressTip = '暂无满减活动';
            if (tiers.length === 0) {
                progressTip = '暂无满减活动';
            } else if (currentTier && !nextTier) {
                progressTip = `已享最高满减：满${parseFloat(currentTier.thresholdAmount)}减${parseFloat(currentTier.discountAmount)}`;
            } else if (currentTier && nextTier) {
                progressTip = `已享满${parseFloat(currentTier.thresholdAmount)}减${parseFloat(currentTier.discountAmount)}，再买${parseFloat(nextTier.gapAmount)}元可享满${parseFloat(nextTier.thresholdAmount)}减${parseFloat(nextTier.discountAmount)}`;
            } else if (nextTier) {
                progressTip = `再买${parseFloat(nextTier.gapAmount)}元可享满${parseFloat(nextTier.thresholdAmount)}减${parseFloat(nextTier.discountAmount)}`;
            }

            return {
                totalAmount: total.toFixed(2),
                currentDiscountAmount: currentDiscountAmount.toFixed(2),
                currentTier,
                nextTier,
                allTiers: tiers,
                progressTip
            };
        }

        function renderCartList() {
            const { items, totalAmount, totalQuantity } = getCartTotals();
            const list = document.getElementById('cartList');

            if (items.length === 0) {
                list.innerHTML = '<div class="cart-empty">🛒 购物车是空的，快去选商品吧~</div>';
                return;
            }

            list.innerHTML = items.map(item => `
                <div class="cart-item">
                    <div class="cart-item-img">${item.emoji}</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">¥${item.price.toFixed(2)}</div>
                    </div>
                    <span class="cart-item-qty">x${item.quantity}</span>
                    <span class="cart-item-subtotal">¥${item.subtotal.toFixed(2)}</span>
                    <button class="cart-item-remove" onclick="removeItem('${item.id}')" title="移除">×</button>
                </div>
            `).join('');
        }

        function renderProgress(progress) {
            document.getElementById('progressTip').textContent = progress.progressTip;

            const fill = document.getElementById('progressBarFill');
            if (progress.nextTier) {
                const percent = progress.nextTier.progressPercent;
                fill.style.width = percent + '%';
            } else if (progress.currentTier) {
                fill.style.width = '100%';
            } else {
                fill.style.width = '0%';
            }

            document.getElementById('curAmount').textContent = '¥' + parseFloat(progress.totalAmount).toFixed(2);
            const nextInfo = document.getElementById('nextTierInfo');
            if (progress.nextTier) {
                nextInfo.innerHTML = `还差 <span class="highlight">¥${parseFloat(progress.nextTier.gapAmount).toFixed(2)}</span> 享 <span class="highlight">减${parseFloat(progress.nextTier.discountAmount)}</span>`;
            } else if (progress.currentTier) {
                nextInfo.innerHTML = `<span class="highlight">🎉 已达最高满减</span>`;
            } else {
                nextInfo.innerHTML = `暂无满减活动`;
            }
        }

        function renderTiers(progress) {
            const { allTiers, currentTier, nextTier } = progress;
            const list = document.getElementById('tiersList');

            if (allTiers.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #bbb; font-size: 13px;">暂无满减阶梯规则</div>';
                return;
            }

            let currentTierId = currentTier ? currentTier.promotionId : null;
            let nextTierId = nextTier ? nextTier.promotionId : null;

            list.innerHTML = allTiers.map(tier => {
                let cls = '';
                if (tier.promotionId === currentTierId) cls = 'reached';
                if (tier.promotionId === nextTierId) cls = 'active';

                const icon = tier.reached ? '✓' :
                    (tier.promotionId === nextTierId ? '🎯' : '🔒');
                const badge = tier.reached ? '已享受' :
                    (tier.promotionId === nextTierId ? '进行中' : '未达成');
                const desc = tier.reached ? `已省 ¥${parseFloat(tier.discountAmount).toFixed(2)}` :
                    `还差 ¥${parseFloat(tier.gapAmount).toFixed(2)} (${tier.progressPercent}%)`;

                return `
                    <div class="tier-item ${cls}">
                        <div class="tier-icon">${icon}</div>
                        <div class="tier-content">
                            <div class="tier-title">${tier.promotionName}</div>
                            <div class="tier-desc">${desc}</div>
                        </div>
                        <span class="tier-badge">${badge}</span>
                    </div>
                `;
            }).join('');
        }

        function renderSummary(progress, totals) {
            const total = totals.totalAmount;
            const discount = parseFloat(progress.currentDiscountAmount) || 0;
            const pay = Math.max(0, total - discount);

            document.getElementById('sumTotal').textContent = '¥' + total.toFixed(2);
            document.getElementById('sumDiscount').textContent = '-¥' + discount.toFixed(2);
            document.getElementById('sumPay').textContent = '¥' + pay.toFixed(2);
            document.getElementById('sumItems').textContent = totals.totalQuantity;
        }

        function renderDebug(progress) {
            const content = document.getElementById('debugContent');
            const lines = [
                `<div class="debug-line"><span class="key">totalAmount:</span> <span class="value">"${progress.totalAmount}"</span></div>`,
                `<div class="debug-line"><span class="key">currentDiscountAmount:</span> <span class="value">"${progress.currentDiscountAmount}"</span></div>`,
                `<div class="debug-line"><span class="key">progressTip:</span> <span class="value">"${progress.progressTip}"</span></div>`,
                `<div class="debug-line"><span class="key">currentTier:</span> <span class="value">${progress.currentTier ? JSON.stringify(progress.currentTier) : 'null'}</span></div>`,
                `<div class="debug-line"><span class="key">nextTier:</span> <span class="value">${progress.nextTier ? JSON.stringify(progress.nextTier) : 'null'}</span></div>`,
                `<div class="debug-line"><span class="key">allTiers:</span> <span class="value">[${progress.allTiers.length} 个阶梯]</span></div>`,
            ];
            content.innerHTML = lines.join('');
        }

        function refreshAll() {
            renderProducts();
            renderCartList();

            const totals = getCartTotals();
            const progress = calculateTieredProgress(totals.totalAmount);

            renderProgress(progress);
            renderTiers(progress);
            renderSummary(progress, totals);
            renderDebug(progress);
        }

        refreshAll();
    </script>
</body>
</html>
